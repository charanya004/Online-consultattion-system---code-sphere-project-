<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Consultation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #4A90E2; /* Blue background - white kadu */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center; /* Text alignment center */
        }

       .login-card {
            background: white;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 450px;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
            font-size: 28px;
        }

       .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        form {
            text-align: left;
        }

        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
            color: #333;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #4A90E2;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #357ABD;
            transform: translateY(-2px);
        }

       .link-text {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
        }

       .link-text a {
            color: #4A90E2;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

       .signup-form {
            display: none;
        }

       .signup-form.active {
            display: block;
        }

       .login-form.active {
            display: block;
        }

       .login-form {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Login Form -->
        <div id="loginForm" class="login-form active">
            <h1>Welcome Back</h1>
            <p class="subtitle">Login to your account</p>
            <form onsubmit="loginUser(event)">
                <label>Email:</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
                
                <label>Password:</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required>
                
                <button type="submit">Login</button>
            </form>
            <p class="link-text">
                Don't have an account? <a onclick="toggleForm()">Sign Up</a>
            </p>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="signup-form">
            <h1>Create Account</h1>
            <p class="subtitle">Sign up to get started</p>
            <form onsubmit="signupUser(event)">
                <label>Full Name:</label>
                <input type="text" id="signupName" placeholder="Enter your name" required>
                
                <label>Email:</label>
                <input type="email" id="signupEmail" placeholder="Enter your email" required>
                
                <label>Phone:</label>
                <input type="tel" id="signupPhone" placeholder="Enter phone number" required>
                
                <label>Password:</label>
                <input type="password" id="signupPassword" placeholder="Create password" required>
                
                <button type="submit">Sign Up</button>
            </form>
            <p class="link-text">
                Already have an account? <a onclick="toggleForm()">Login</a>
            </p>
        </div>
    </div>

<script>
function toggleForm() {
    document.getElementById('loginForm').classList.toggle('active');
    document.getElementById('signupForm').classList.toggle('active');
}

function loginUser(event) {
    event.preventDefault();
    const email = document.getElementById('loginEmail').value;
    
    // User name ni localStorage lo save chesthunam
    localStorage.setItem('userEmail', email);
    localStorage.setItem('userName', email.split('@')[0]);
    
    // Dashboard ki redirect
    window.location.href = 'dashboard.html';
}

function signupUser(event) {
    event.preventDefault();
    alert('Account Created Successfully! Please login.');
    toggleForm();
}
</script>

</body>
</html>
